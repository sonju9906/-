<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 얼굴형 분석 서비스</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background-color: #f5f7fa; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        input[type="file"] { margin: 20px 0; }
        button { background-color: #4A90E2; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #357ABD; }
        #result { margin-top: 30px; padding: 20px; border-top: 2px solid #eee; display: none; text-align: left; }
        .result-item { margin-bottom: 10px; }
        .label { font-weight: bold; color: #4A90E2; }
        .loading { display: none; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>내 얼굴형 찾기 🔍</h1>
    <p>사진을 업로드하여 분석을 시작하세요.</p>
    
    <input type="file" id="fileInput" accept="image/*">
    <img id="preview" src="#" alt="미리보기">
    
    <button onclick="uploadImage()">분석하기</button>
    <div class="loading" id="loading">분석 중입니다... 잠시만 기다려주세요.</div>

    <div id="result">
        <div class="result-item"><span class="label">얼굴형:</span> <span id="faceShape">-</span></div>
        <div class="result-item"><span class="label">추천 헤어:</span> <span id="hairStyle">-</span></div>
        <div class="result-item"><span class="label">전문가 팁:</span> <br><span id="advice">-</span></div>
    </div>
</div>

<script>
    // 사진 선택 시 미리보기 화면 띄우기
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    fileInput.onchange = evt => {
        const [file] = fileInput.files;
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    }

    // 서버로 사진 전송 및 결과 받기 (FastAPI 연동)
    async function uploadImage() {
        const file = fileInput.files[0];
        if (!file) {
            alert("사진을 먼저 선택해주세요!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        // UI 상태 변경
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        try {
            // FastAPI 서버 주소 (8000번 포트)
            const response = await fetch('http://127.0.0.1:8000/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('faceShape').innerText = data.face_shape;
                document.getElementById('hairStyle').innerText = data.recommendation.hair_style;
                document.getElementById('advice').innerText = data.recommendation.advice;
                document.getElementById('result').style.display = 'block';
            } else {
                alert("에러 발생: " + (data.error || "분석 실패"));
            }
        } catch (error) {
            console.error("Error:", error);
            alert("서버와 연결할 수 없습니다. FastAPI 서버가 켜져 있는지 확인하세요.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
